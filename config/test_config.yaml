target:
  platform: qnx
  arch: aarch64
  hostname: raspberrypi-qnx
  ssh_port: 22

kuksa:
  databroker_host: localhost
  databroker_port: 55555
  protocol: grpc

mqtt:
  broker_host: localhost
  broker_port: 1883

vss:
  version: "4.0"
  signals:
    - Vehicle.Speed
    - Vehicle.Powertrain.Battery.StateOfCharge.Current
    - Vehicle.Powertrain.Battery.Temperature
    - Vehicle.Powertrain.Battery.CurrentVoltage

# Eclipse S-CORE modules
score:
  communication:
    source_dir: score-communication
    build_system: bazel
    bazel_version: "8.3.0"
    build_cmd: "bazel build //..."
    test_cmd: "bazel test //... --build_tests_only"
    integration_cmd: "bazel test //quality/integration_testing/..."
    sanitizer_cmd: "bazel test --config=asan_ubsan_lsan //... --build_tests_only"
    coverage_cmd: "bazel coverage //..."
    benchmark_targets:
      - "//score/mw/com/performance_benchmarks/api_microbenchmarks:all"
    qnx_config: "qnx_arm64"
    asil: B
    test_count_expected: 220
    integration_suites_expected: 25
    platforms:
      - linux_x86_64
      - linux_aarch64
      - qnx_x86_64
      - qnx_aarch64

  baselibs:
    source_dir: score-baselibs
    build_system: bazel
    bazel_version: "8.3.0"
    build_cmd: "bazel build //..."
    test_cmd: "bazel test //... --build_tests_only"
    sanitizer_cmd: "bazel test --config=asan_ubsan_lsan //... --build_tests_only"
    coverage_cmd: "bazel coverage //..."
    asil: B
    platforms:
      - linux_x86_64
      - linux_aarch64
      - qnx_x86_64
      - qnx_aarch64

  baselibs_rust:
    source_dir: score-baselibs_rust
    build_system: cargo
    bazel_version: "8.4.2"
    build_cmd: "cargo build --workspace"
    test_cmd: "cargo test --workspace"
    sanitizer_cmd: "cargo test --workspace -- --test-threads=1"
    asil: B
    platforms:
      - linux_x86_64
      - linux_aarch64

  lifecycle:
    source_dir: score-lifecycle
    build_system: bazel
    bazel_version: "8.3.0"
    build_cmd: "bazel build //..."
    test_cmd: "bazel test //... --build_tests_only"
    sanitizer_cmd: "bazel test --config=asan_ubsan_lsan //... --build_tests_only"
    asil: B
    platforms:
      - linux_x86_64
      - linux_aarch64
      - qnx_x86_64
      - qnx_aarch64

  feo:
    source_dir: score-feo
    build_system: bazel
    bazel_version: "8.3.0"
    build_cmd: "bazel build //..."
    test_cmd: "bazel test //... --build_tests_only"
    sanitizer_cmd: "bazel test --config=asan_ubsan_lsan //... --build_tests_only"
    asil: B
    platforms:
      - linux_x86_64
