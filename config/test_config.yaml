      - qnx_aarch64

  logging:
    source_dir: score-logging
    build_system: bazel
    bazel_version: "8.3.0"
    build_cmd: "bazel build --config=x86_64-linux //score/..."
    test_cmd: "bazel test --config=x86_64-linux //score/... --build_tests_only"
    sanitizer_cmd: "bazel test --config=asan_ubsan_lsan //score/... --build_tests_only"
